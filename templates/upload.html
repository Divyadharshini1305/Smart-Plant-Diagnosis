<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Image</title>
<link rel="stylesheet" href="{{ url_for('static', filename='sytle.css') }}">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #04110a, #071a10, #0c2417);
    color: white;
    min-height: 100vh;
}

.upload-container {
    max-width: 750px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    text-align: center;
}

.upload-container h2 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.upload-container p {
    color: #cfcfcf;
    margin-bottom: 35px;
}

.upload-box {
    border: 2px dashed rgba(76,175,80,0.4);
    border-radius: 20px;
    padding: 60px 30px;
    margin-bottom: 35px;
}

.upload-icon {
    font-size: 4rem;
    margin-bottom: 20px;
}

.upload-box h3 {
    margin-bottom: 10px;
    font-size: 1.6rem;
}

.upload-box p {
    color: #bdbdbd;
    margin-bottom: 20px;
}

input[type="file"] {
    background: transparent;
    color: white;
    padding: 10px;
}

.detect-btn {
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    border: none;
    padding: 18px 35px;
    font-size: 1.2rem;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.detect-btn:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="upload-container">
    <h2>Disease Prediction</h2>
    <p>Upload a leaf image of {{ crop|capitalize }} for disease detection.</p>

    <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="crop" value="{{ crop }}">

        <div class="upload-box">
            <div class="upload-icon">☁️</div>
            <h3>Upload Leaf Image</h3>
            <p>Select an image from your device</p>
            <input type="file" name="image" required>
        </div>

        <button type="submit" class="detect-btn">🧪 Detect disease</button>
    </form>
</div>

</body>
</html>
